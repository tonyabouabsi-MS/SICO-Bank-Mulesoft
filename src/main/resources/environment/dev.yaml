# Environment specific properties
environment:
 name: "dev"
 id: "94786dea-dd7c-4f46-beaa-19988ad65c1f"
  
api:
 name: "${application.name}-${environment.name}"
 id: ""
 version: "v1"

http:
  path: "/api/${api.name}/${api.version}/*"
  host: "0.0.0.0"
  port: "8081"
  timeout: "99999999"

https:
  listener:
    path: "/api/${api.name}/${api.version}/*"
    host: "0.0.0.0"
    port: "8081"
    alias: "template"
    pwdKeystore: "template"
    pwdTruststore: "template"
    keystorePath: "keystore/keystore.jks"
    timeout: "99999999"
    
database:
  aws-dhb: 
    host: "10.16.2.162"
    port: "1433"
    username: "apiuser"
    password: "${secure::encrypt.password}"
    databaseName: "DWH"
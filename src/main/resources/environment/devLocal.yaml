# Environment specific properties
environment:
 name: "devLocal"
# id: 998c26e2-3774-4ef5-b71b-dff93879263b
  
api:
 name: "${application.name}-${environment.name}"
 id: ""
 version: "v1"

http:
  path: "/api/${api.name}/${api.version}/*"
  host: "0.0.0.0"
  port: "8081"
  timeout: "99999999"

https:
  path: "/api/${api.name}/${api.version}/*"
  host: "0.0.0.0"
  port: "8081"
  alias: "template"
  pwdKeystore: "template"
  pwdTruststore: "template"
  keystorePath: "keystore/keystore.jks"
  timeout: "99999999"
    
database:
  aws-dhb: 
    host: "10.16.2.162"
    port: "1433"
    username: "apiuser"
    password: "${secure::encrypt.password}"
    databaseName: "DWH"